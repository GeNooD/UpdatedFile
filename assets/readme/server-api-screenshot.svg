<text x="80" y="124" class="subtitle">Registration route and Express setup</text>
<text x="74" y="170" class="ln"> 1</text><text x="145" y="170" class="code">// server.js</text>
<text x="74" y="214" class="ln"> 2</text><text x="145" y="214" class="code">require('dotenv').config();</text>
<text x="74" y="258" class="ln"> 3</text><text x="145" y="258" class="code"></text>
<text x="74" y="302" class="ln"> 4</text><text x="145" y="302" class="code">const express = require('express');</text>
<text x="74" y="346" class="ln"> 5</text><text x="145" y="346" class="code">const path = require('path');</text>
<text x="74" y="390" class="ln"> 6</text><text x="145" y="390" class="code">const pool = require('./db');</text>
<text x="74" y="434" class="ln"> 7</text><text x="145" y="434" class="code">const { doctors } = require('./data/mockData');</text>
<text x="74" y="478" class="ln"> 8</text><text x="145" y="478" class="code"></text>
<text x="74" y="522" class="ln"> 9</text><text x="145" y="522" class="code">const app = express();</text>
<text x="74" y="566" class="ln">10</text><text x="145" y="566" class="code">const PORT = process.env.PORT || 3000;</text>
<text x="74" y="610" class="ln">11</text><text x="145" y="610" class="code"></text>
<text x="74" y="654" class="ln">12</text><text x="145" y="654" class="code">app.use(express.json());</text>
<text x="74" y="698" class="ln">13</text><text x="145" y="698" class="code">app.use(express.static(path.join(__dirname, 'public')));</text>
<text x="74" y="742" class="ln">14</text><text x="145" y="742" class="code"></text>
<text x="74" y="786" class="ln">15</text><text x="145" y="786" class="code">app.post('/api/register', async (req, res) =&gt; {</text>
<text x="74" y="830" class="ln">16</text><text x="145" y="830" class="code">  try {</text>
<text x="74" y="874" class="ln">17</text><text x="145" y="874" class="code">    const { username, password, name, dob, nhsNumber, email,</text>
<text x="74" y="918" class="ln">18</text><text x="145" y="918" class="code">      phone, address, emergencyContact } = req.body || {};</text>
<text x="74" y="962" class="ln">19</text><text x="145" y="962" class="code"></text>
<text x="74" y="1006" class="ln">20</text><text x="145" y="1006" class="code">    if (!username || !password || !name || !dob || !nhsNumber ||</text>
<text x="74" y="1050" class="ln">21</text><text x="145" y="1050" class="code">        !email || !phone || !address || !emergencyContact) {</text>
<text x="74" y="1094" class="ln">22</text><text x="145" y="1094" class="code">      return res.status(400).json({</text>
<text x="74" y="1138" class="ln">23</text><text x="145" y="1138" class="code">        message: 'Please complete all required fields.'</text>
<text x="74" y="1182" class="ln">24</text><text x="145" y="1182" class="code">      });</text>
<text x="74" y="1226" class="ln">25</text><text x="145" y="1226" class="code">    }</text></svg>