<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="1100" viewBox="0 0 1440 1100">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f4f8ff"/>
      <stop offset="50%" stop-color="#e8f0ff"/>
      <stop offset="100%" stop-color="#f4f8ff"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#336fe6"/>
      <stop offset="100%" stop-color="#6c58db"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#11233e" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="1440" height="1100" fill="url(#bg)"/>
  <rect x="0" y="0" width="1440" height="64" fill="#f4f8ff" opacity="0.92"/>
  <rect x="46" y="14" width="34" height="34" rx="10" fill="url(#brand)"/>
  <text x="56" y="37" font-family="Arial, sans-serif" font-size="18">🏥</text>
  <text x="92" y="31" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#11233e">NHS Patient Portal</text>
  <text x="92" y="48" font-family="Arial, sans-serif" font-size="11" fill="#4f6280">Hospital Self-Service</text>
  <circle cx="1382" cy="32" r="18" fill="#ffffff" stroke="#cfd9ea"/>
  <text x="1373" y="38" font-family="Arial, sans-serif" font-size="18">🌙</text>

  <g filter="url(#shadow)">
    <rect x="90" y="150" width="690" height="760" rx="24" fill="rgba(255,255,255,0.88)" stroke="#d6e1f3"/>
    <rect x="810" y="150" width="540" height="760" rx="24" fill="rgba(255,255,255,0.96)" stroke="#d6e1f3"/>
  </g>

  <rect x="132" y="198" width="60" height="60" rx="18" fill="url(#brand)"/>
  <text x="149" y="236" font-family="Arial, sans-serif" font-size="28">🏥</text>
  <text x="132" y="292" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#139f7f">PATIENT SERVICES</text>
  <text x="132" y="340" font-family="Arial, sans-serif" font-size="40" font-weight="700" fill="#11233e">Welcome to the Hospital</text>
  <text x="132" y="385" font-family="Arial, sans-serif" font-size="40" font-weight="700" fill="#336fe6">Self-Service Portal</text>
  <text x="132" y="432" font-family="Arial, sans-serif" font-size="19" fill="#4f6280">Sign in to manage appointments, access medical records,</text>
  <text x="132" y="462" font-family="Arial, sans-serif" font-size="19" fill="#4f6280">and update your healthcare details securely.</text>

  <g font-family="Arial, sans-serif" font-size="15" font-weight="600" fill="#11233e">
    <rect x="132" y="512" width="118" height="40" rx="20" fill="#eef3ff" stroke="#d6e1f3"/><text x="155" y="537">Secure login</text>
    <rect x="264" y="512" width="162" height="40" rx="20" fill="#eef3ff" stroke="#d6e1f3"/><text x="286" y="537">Online appointments</text>
    <rect x="440" y="512" width="156" height="40" rx="20" fill="#eef3ff" stroke="#d6e1f3"/><text x="463" y="537">Patient dashboard</text>
    <rect x="132" y="568" width="136" height="40" rx="20" fill="#eef3ff" stroke="#d6e1f3"/><text x="160" y="593">Medical records</text>
  </g>

  <rect x="132" y="646" width="560" height="184" rx="18" fill="#ffffff" stroke="#d6e1f3"/>
  <rect x="132" y="646" width="6" height="184" rx="3" fill="#139f7f"/>
  <text x="160" y="690" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#11233e">Online patient access</text>
  <text x="160" y="730" font-family="Arial, sans-serif" font-size="18" fill="#4f6280">Use the portal to manage bookings, keep details current,</text>
  <text x="160" y="758" font-family="Arial, sans-serif" font-size="18" fill="#4f6280">and access your healthcare information in one place.</text>
  <circle cx="168" cy="796" r="5" fill="#139f7f"/><text x="184" y="802" font-family="Arial, sans-serif" font-size="17" fill="#11233e">Manage appointments online</text>
  <circle cx="168" cy="834" r="5" fill="#139f7f"/><text x="184" y="840" font-family="Arial, sans-serif" font-size="17" fill="#11233e">Update your profile securely</text>
  <circle cx="168" cy="872" r="5" fill="#139f7f"/><text x="184" y="878" font-family="Arial, sans-serif" font-size="17" fill="#11233e">View records when you need them</text>

  <text x="852" y="224" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#139f7f">SECURE ACCESS</text>
  <text x="852" y="264" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#11233e">Patient login</text>
  <text x="852" y="300" font-family="Arial, sans-serif" font-size="18" fill="#4f6280">Enter your details below to continue to your dashboard.</text>
  <text x="852" y="360" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#11233e">Username</text>
  <rect x="852" y="378" width="456" height="54" rx="14" fill="#ffffff" stroke="#d6e1f3"/>
  <text x="872" y="412" font-family="Arial, sans-serif" font-size="17" fill="#7c8ca5">Enter username</text>
  <text x="852" y="474" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#11233e">Password</text>
  <rect x="852" y="492" width="456" height="54" rx="14" fill="#ffffff" stroke="#d6e1f3"/>
  <text x="872" y="526" font-family="Arial, sans-serif" font-size="17" fill="#7c8ca5">Enter password</text>
  <rect x="852" y="580" width="456" height="56" rx="16" fill="url(#brand)"/>
  <text x="995" y="616" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff">Sign in to dashboard</text>
  <text x="852" y="702" font-family="Arial, sans-serif" font-size="17" fill="#4f6280">Do not have an account?</text>
  <text x="1040" y="702" font-family="Arial, sans-serif" font-size="17" fill="#1055cc">Create one here</text>

  <text x="90" y="1018" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#11233e">Website preview: login page</text>
  <text x="90" y="1048" font-family="Arial, sans-serif" font-size="16" fill="#4f6280">Based on the real login page structure and styling in the repository.</text>
</svg>